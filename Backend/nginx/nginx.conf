# Moshn — reverse proxy (3 subdomen, HTTPS bilan).
#   api.moshn.uz    -> backend (Go API + /v1/ws WebSocket + /uploads)
#   admin.moshn.uz  -> admin (Next.js)
#   media.moshn.uz  -> APK va statik fayllar (yuklab olish)
# moshn.uz / www.moshn.uz — Vercel'da landing, bu yerda EMAS.

upstream moshn_backend { server backend:8080; }
upstream moshn_admin   { server admin:3000; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------- HTTP -> HTTPS redirect (+ ACME challenge) ----------
server {
    listen 80;
    server_name api.moshn.uz admin.moshn.uz media.moshn.uz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---------- API: api.moshn.uz ----------
server {
    listen 443 ssl;
    http2 on;
    server_name api.moshn.uz;
    ssl_certificate     /etc/letsencrypt/live/api.moshn.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.moshn.uz/privkey.pem;
    client_max_body_size 25m;

    # WebSocket — real-time SOS
    location /v1/ws {
        proxy_pass http://moshn_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://moshn_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- Admin: admin.moshn.uz ----------
server {
    listen 443 ssl;
    http2 on;
    server_name admin.moshn.uz;
    ssl_certificate     /etc/letsencrypt/live/api.moshn.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.moshn.uz/privkey.pem;
    client_max_body_size 25m;

    location / {
        proxy_pass http://moshn_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- Media/APK: media.moshn.uz ----------
server {
    listen 443 ssl;
    http2 on;
    server_name media.moshn.uz;
    ssl_certificate     /etc/letsencrypt/live/api.moshn.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.moshn.uz/privkey.pem;
    client_max_body_size 200m;

    root /usr/share/nginx/media;
    index index.html;

    location ~* \.apk$ {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
