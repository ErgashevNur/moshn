services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-moshn}
      POSTGRES_USER: ${DB_USER:-moshn}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD .env da kerak}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-moshn} -d ${DB_NAME:-moshn}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_USER:-moshn}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-moshn}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - UZBEKVOICE_API_KEY=${UZBEKVOICE_API_KEY}
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
      - YANDEX_MAPS_API_KEY=${YANDEX_MAPS_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - PORT=8080
      - GIN_MODE=release
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    volumes:
      - uploads:/app/uploads

  admin:
    build:
      context: ./admin
      args:
        # Brauzer admin API'ga shu URL orqali ulanadi (build vaqtida bekitiladi).
        # Nginx orqali bir xil originda bo'lsa "/v1" yetarli.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/v1}
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/usr/share/nginx/media:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  pgdata:
  uploads:
