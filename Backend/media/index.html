<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moshn — Android ilovasi</title>
  <style>
    :root { --coral:#FF5A4D; --navy:#0E1428; --ink:#0E1428; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
           background:var(--navy); color:#fff; min-height:100vh;
           display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { max-width:420px; width:100%; text-align:center; }
    .logo { font-size:40px; font-weight:800; letter-spacing:-1px; }
    .logo span { color:var(--coral); }
    p { color:#aab; margin:14px 0 28px; line-height:1.5; }
    .btn { display:inline-block; background:var(--coral); color:#fff; text-decoration:none;
           font-weight:700; font-size:18px; padding:16px 32px; border-radius:0;
           transition:.15s; }
    .btn:hover { filter:brightness(1.08); }
    .hint { margin-top:20px; font-size:13px; color:#778; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">mosh<span>n</span></div>
    <p>Android ilovasini yuklab oling va o'rnating.<br>
       O'rnatishda "Noma'lum manbalar"ga ruxsat bering.</p>
    <a class="btn" href="/moshn.apk">APK yuklab olish</a>
    <div class="hint">uz.moshn.moshn • Android 6.0+</div>
  </div>
</body>
</html>
