<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Moshn — Mijoz ilovasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="moshn.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(1200px 600px at 50% -10%, #1b1b1f 0%, transparent 60%),
      #0e0e10;
    display: grid; place-items: center; min-height: 100vh;
    font-family: "Sora", system-ui, sans-serif;
    padding: 24px; box-sizing: border-box;
  }
  #root { display: grid; place-items: center; }
  .device-shadow { filter: drop-shadow(0 40px 90px rgba(0,0,0,0.5)); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="moshn-i18n.jsx"></script>
<script type="text/babel" src="moshn-data.jsx"></script>
<script type="text/babel" src="moshn-icons.jsx"></script>
<script type="text/babel" src="moshn-ui.jsx"></script>
<script type="text/babel" src="moshn-screens-auth.jsx"></script>
<script type="text/babel" src="moshn-screens-discover.jsx"></script>
<script type="text/babel" src="moshn-screens-booking.jsx"></script>
<script type="text/babel" src="moshn-screens-account.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const TABS = ["home","bookings","garage","profile"];
const LS = (k, d) => { try { return localStorage.getItem("moshn_"+k) ?? d; } catch(e){ return d; } };
const setLS = (k, v) => { try { localStorage.setItem("moshn_"+k, v); } catch(e){} };

function BottomNav({ app }) {
  const { t, tab, go } = app;
  const items = [
    { id: "home", icon: "home", label: t("navHome") },
    { id: "bookings", icon: "calendar", label: t("navBookings") },
    null, // SOS slot
    { id: "garage", icon: "car", label: t("navGarage") },
    { id: "profile", icon: "user", label: t("navProfile") },
  ];
  return (
    <div className="botnav">
      {items.map((it, i) => it === null ? (
        <button key="sos" className="botnav-sos" onClick={() => go("sos")}>SOS</button>
      ) : (
        <button key={it.id} className="botnav-item" data-active={tab === it.id} onClick={() => go(it.id)}>
          <Icon name={it.icon} size={23} stroke={tab===it.id?2:1.7} />
          {it.label}
        </button>
      ))}
    </div>
  );
}

function App() {
  const [lang, setLangS] = useState(LS("lang","uz"));
  const [theme, setThemeS] = useState(LS("theme","dark"));
  const [route, setRoute] = useState(LS("route","onboarding"));
  const [tab, setTab] = useState(LS("tab","home"));
  const [svc, setSvc] = useState(null);
  const [shop, setShop] = useState(null);
  const [order, setOrder] = useState(null);
  const [anim, setAnim] = useState("anim-in");

  const t = makeT(lang);
  const setLang = (l) => { setLangS(l); setLS("lang", l); };
  const setTheme = (th) => { setThemeS(th); setLS("theme", th); };

  useEffect(() => { setLS("route", route); }, [route]);
  useEffect(() => { setLS("tab", tab); }, [tab]);

  // Enable mount-reveal animations only once the frame clock is confirmed
  // running (double rAF). In frozen/offscreen capture this never fires, so
  // content stays visible instead of stuck at opacity:0.
  const rootRef = React.useRef(null);
  useEffect(() => {
    let id1, id2;
    id1 = requestAnimationFrame(() => {
      id2 = requestAnimationFrame(() => {
        if (rootRef.current) rootRef.current.classList.add("motion");
      });
    });
    return () => { cancelAnimationFrame(id1); cancelAnimationFrame(id2); };
  }, []);

  const go = (name) => {
    if (TABS.includes(name)) { setTab(name); setRoute("app"); }
    else setRoute(name);
    const body = document.querySelector(".screen-body, .screen");
    if (body) body.scrollTop = 0;
  };

  const app = { lang, theme, t, setLang, setTheme, route, setRoute, tab, setTab, go,
    svc, setSvc, shop, setShop, order, setOrder };

  const screens = {
    onboarding: <Onboarding app={app} />,
    auth: <Auth app={app} />,
    map: <MapScreen app={app} />,
    detail: <WorkshopDetail app={app} />,
    booking: <Booking app={app} />,
    payment: <Payment app={app} />,
    confirm: <Confirmation app={app} />,
    sos: <SOS app={app} />,
    notifications: <Notifications app={app} />,
  };
  const tabScreens = {
    home: <Home app={app} />,
    bookings: <Bookings app={app} />,
    garage: <Garage app={app} />,
    profile: <Profile app={app} />,
  };

  const showFrame = !["onboarding","auth"].includes(route);
  const isAppShell = route === "app";

  return (
    <div className="device-shadow">
      <IOSDevice dark={theme === "dark"}>
        <div ref={rootRef} className="moshn" data-theme={theme} style={{ height: "100%", display: "flex", flexDirection: "column", background: "var(--bg)", overflow: "hidden" }}>
          <div style={{ height: 50, flexShrink: 0, background: "var(--bg)" }} />
          <div style={{ flex: 1, position: "relative", minHeight: 0 }}>
            <div key={route + tab} className={anim} style={{ position: "absolute", inset: 0 }}>
              {isAppShell ? (
                <div className="screen">
                  <div style={{ flex: 1, position: "relative", minHeight: 0 }}>
                    <div style={{ position: "absolute", inset: 0 }}>{tabScreens[tab]}</div>
                  </div>
                  <BottomNav app={app} />
                </div>
              ) : screens[route]}
            </div>
          </div>
        </div>
      </IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
